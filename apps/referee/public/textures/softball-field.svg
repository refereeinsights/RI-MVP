<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Softball field texture">
  <defs>
    <linearGradient id="grass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2f7f4f"/>
      <stop offset="100%" stop-color="#1f5f38"/>
    </linearGradient>
    <linearGradient id="dirt" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#c48a56"/>
      <stop offset="100%" stop-color="#a5673d"/>
    </linearGradient>
    <pattern id="mow" width="120" height="120" patternUnits="userSpaceOnUse" patternTransform="rotate(90)">
      <rect width="60" height="120" fill="rgba(255,255,255,0.04)"/>
      <rect x="60" width="60" height="120" fill="rgba(0,0,0,0.03)"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#grass)"/>
  <rect width="1200" height="800" fill="url(#mow)"/>

  <g transform="translate(600 560)">
    <path d="M 0 -230 L 230 0 L 0 230 L -230 0 Z" fill="url(#dirt)" opacity="0.96"/>
    <path d="M 0 -178 L 178 0 L 0 178 L -178 0 Z" fill="url(#grass)" opacity="0.92"/>
    <circle cx="0" cy="0" r="74" fill="url(#dirt)" opacity="0.95"/>
    <circle cx="0" cy="0" r="10" fill="#ffffff" opacity="0.95"/>

    <g fill="#ffffff" opacity="0.92">
      <rect x="-8" y="-186" width="16" height="16" rx="2" transform="rotate(45)"/>
      <rect x="170" y="-8" width="16" height="16" rx="2" transform="rotate(45)"/>
      <rect x="-8" y="170" width="16" height="16" rx="2" transform="rotate(45)"/>
      <rect x="-186" y="-8" width="16" height="16" rx="2" transform="rotate(45)"/>
    </g>

    <path d="M 0 -230 A 230 230 0 0 1 230 0" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.72"/>
    <path d="M 0 -230 A 230 230 0 0 0 -230 0" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.72"/>
    <path d="M 0 0 L 0 -150" stroke="#ffffff" stroke-width="4" opacity="0.82"/>
  </g>
</svg>
