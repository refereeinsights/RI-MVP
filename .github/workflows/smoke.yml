name: nightly smoke

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run RI smoke (root smoke config)
        run: npx playwright test -c playwright.smoke.config.ts --project=ri-smoke --reporter=line,junit
        env:
          PLAYWRIGHT_RI_BASE_URL: ${{ secrets.RI_TARGET_URL }}
          RI_SMOKE_EMAIL: ${{ secrets.RI_SMOKE_EMAIL }}
          RI_SMOKE_PASSWORD: ${{ secrets.RI_SMOKE_PASSWORD }}
          TI_SMOKE_INSIDER_EMAIL: ${{ secrets.TI_SMOKE_INSIDER_EMAIL }}
          TI_SMOKE_INSIDER_PASSWORD: ${{ secrets.TI_SMOKE_INSIDER_PASSWORD }}
          PLAYWRIGHT_JUNIT_OUTPUT_DIR: test-results
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: smoke-ri.xml

      - name: Run TI smoke (root smoke config)
        run: npx playwright test -c playwright.smoke.config.ts --project=ti-smoke --reporter=line,junit
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.TI_TARGET_URL }}
          TI_SMOKE_EXPLORER_EMAIL: ${{ secrets.TI_SMOKE_EXPLORER_EMAIL }}
          TI_SMOKE_EXPLORER_PASSWORD: ${{ secrets.TI_SMOKE_EXPLORER_PASSWORD }}
          TI_SMOKE_INSIDER_EMAIL: ${{ secrets.TI_SMOKE_INSIDER_EMAIL }}
          TI_SMOKE_INSIDER_PASSWORD: ${{ secrets.TI_SMOKE_INSIDER_PASSWORD }}
          TI_SMOKE_JOIN_CODE: ${{ secrets.TI_SMOKE_JOIN_CODE }}
          PLAYWRIGHT_JUNIT_OUTPUT_DIR: test-results
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: smoke-ti.xml

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: test-results/*.xml
